services:
    frontend:
        build:
            context: frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - ${FRONTEND_HTTP_PORT}:80
        environment:
            - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
            - FRONTEND_HTTP_PORT=${FRONTEND_HTTP_PORT}
            - API_BASE_URL=${API_BASE_URL}
        volumes:
            - ./nginx.conf.template:/etc/nginx/conf.d/default.conf.template
        depends_on:
            - backend

    backend:
        build:
            context: backend
            dockerfile: Dockerfile
        image: philobiblon/backend:latest
        restart: unless-stopped
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - backend-data:/app/data
        environment:
            - SEARCH_DB_PATH=/app/data/searchcache
            - WIKIBASE_BASE_URL=${WIKIBASE_BASE_URL}
            - WIKIBASE_API_URL=${WIKIBASE_API_URL}
            - WIKIBASE_INDEX_URL=${WIKIBASE_INDEX_URL}
            - WIKIBASE_NICE_URL_BASE=${WIKIBASE_NICE_URL_BASE}
            - SPARQL_BASE_URL=${SPARQL_BASE_URL}
            - SPARQL_ENDPOINT=${SPARQL_ENDPOINT}
            - SPARQL_QUERY_PREFIX=${SPARQL_QUERY_PREFIX}
            - OAUTH_CONSUMER_KEY=${OAUTH_CONSUMER_KEY}
            - OAUTH_CONSUMER_SECRET=${OAUTH_CONSUMER_SECRET}
            - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL}
            - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

    # On-demand only: excluded from the default `docker compose up`/`up -d` set because of the
    # "manual" profile. Run explicitly with `docker compose run --rm quicksearch-registrar`
    # whenever a filter is added/changed in frontend/service/quickSearchFilters.js.
    quicksearch-registrar:
        build:
            context: frontend
            dockerfile: Dockerfile
            target: quicksearch-registrar
        profiles:
            - manual
        restart: "no"
        depends_on:
            - backend
        environment:
            - BACKEND_URL=http://backend:8080

volumes:
    backend-data:
