spring.cache.type=caffeine

logging.level.io.github.philobiblon=INFO

allowed.origins=${ALLOWED_ORIGINS}

oauth.consumerKey=${OAUTH_CONSUMER_KEY}
oauth.consumerSecret=${OAUTH_CONSUMER_SECRET}
oauth.callbackUrl=${OAUTH_CALLBACK_URL}

wikibase.baseUrl=${WIKIBASE_BASE_URL}
wikibase.apiUrl=${WIKIBASE_API_URL}
wikibase.indexUrl=${WIKIBASE_INDEX_URL}
wikibase.niceUrlBase=${WIKIBASE_NICE_URL_BASE}

sparql.baseUrl=${SPARQL_BASE_URL}
sparql.endpoint=${SPARQL_ENDPOINT}
sparql.queryPrefix=${SPARQL_QUERY_PREFIX}
sparql.cache.compressResults=${SPARQL_CACHE_COMPRESS_RESULTS:false}

# Local materialized index for QuickSearch filters (registered at deploy time, see search.index.maxFilters)
spring.datasource.url=jdbc:h2:file:${SEARCH_DB_PATH:./data/searchcache}
spring.jpa.hibernate.ddl-auto=update
search.index.refreshCron=${SEARCH_INDEX_REFRESH_CRON:0 0 3 * * *}
search.index.maxFilters=${SEARCH_INDEX_MAX_FILTERS:50}
search.index.retry.maxAttempts=${SEARCH_INDEX_RETRY_MAX_ATTEMPTS:5}
search.index.retry.initialBackoffMs=${SEARCH_INDEX_RETRY_INITIAL_BACKOFF_MS:10000}
search.index.retry.backoffMultiplier=${SEARCH_INDEX_RETRY_BACKOFF_MULTIPLIER:4}