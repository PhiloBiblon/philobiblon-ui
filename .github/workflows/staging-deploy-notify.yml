name: Staging deploy notification

on:
  workflow_run:
    workflows: ["Staging — build, push & deploy"]
    types: [completed]
    branches: [master]

jobs:
  find-pr:
    name: Check deploy result & find pull request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read

    outputs:
      deploy_ok: ${{ steps.check.outputs.deploy_ok }}
      failed_jobs: ${{ steps.check.outputs.failed_jobs }}
      number: ${{ steps.find.outputs.number }}

    steps:
      - name: Check build-and-push and deploy conclusions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # github.event.workflow_run.conclusion reflects the *whole* staging.yml
          # run, including the unrelated cleanup job — check build-and-push and
          # deploy specifically so a cleanup-only failure doesn't suppress a
          # genuinely successful deploy's notification.
          JOBS_JSON="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" --paginate)"
          BUILD_CONCLUSION="$(echo "$JOBS_JSON" | jq -r '.jobs[] | select(.name=="Build & push images") | .conclusion')"
          DEPLOY_CONCLUSION="$(echo "$JOBS_JSON" | jq -r '.jobs[] | select(.name=="Deploy to staging") | .conclusion')"

          DEPLOY_OK=false
          if [ "$BUILD_CONCLUSION" = "success" ] && [ "$DEPLOY_CONCLUSION" = "success" ]; then
            DEPLOY_OK=true
          fi

          FAILED=""
          [ "$BUILD_CONCLUSION" = "failure" ] && FAILED="build-and-push (failure)"
          if [ "$DEPLOY_CONCLUSION" = "failure" ]; then
            FAILED="${FAILED:+$FAILED, }deploy (failure)"
          fi

          echo "deploy_ok=$DEPLOY_OK" >> "$GITHUB_OUTPUT"
          echo "failed_jobs=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Find pull request for the deployed commit
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON="$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0] // empty')"
          if [ -z "$PR_JSON" ]; then
            echo "No pull request associated with ${{ github.event.workflow_run.head_sha }}"
            exit 0
          fi
          echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"

  notify-success:
    name: Notify deploy success via PR comment
    needs: find-pr
    if: needs.find-pr.outputs.deploy_ok == 'true' && needs.find-pr.outputs.number != ''
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Compute deployed version
        id: version
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Mirrors staging.yml's "Update frontend version" step so the
          # comment reports the exact version that was built and deployed.
          BASE_VERSION="$(sed -n "s/^[[:space:]]*version: '\([^']*\)'.*/\1/p" frontend/nuxt.config.ts | head -n1)"
          SHORT_SHA="${HEAD_SHA:0:7}"
          echo "version=${BASE_VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Find linked issues and their authors
        id: issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.find-pr.outputs.number }}
        run: |
          PR_TEXT="$(gh pr view "$PR_NUMBER" --json title,body -q '(.title + "\n" + .body)')"
          CANDIDATES="$(echo "$PR_TEXT" | grep -oE '#[0-9]+' | tr -d '#' | sort -u)"
          AUTHORS=""
          for n in $CANDIDATES; do
            if [ "$n" = "$PR_NUMBER" ]; then
              continue
            fi
            AUTHOR="$(gh issue view "$n" --json author -q '.author.login' 2>/dev/null || true)"
            if [ -n "$AUTHOR" ]; then
              case " $AUTHORS " in
                *" $AUTHOR "*) ;;
                *) AUTHORS="${AUTHORS:+$AUTHORS }$AUTHOR" ;;
              esac
            fi
          done
          echo "numbers=$(echo "$CANDIDATES" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "authors=$AUTHORS" >> "$GITHUB_OUTPUT"

      - name: Generate summary and test plan with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ needs.find-pr.outputs.number }}
            LINKED ISSUE NUMBERS: ${{ steps.issues.outputs.numbers }}

            Read that pull request's title, body, comments and reviews with:
              gh pr view ${{ needs.find-pr.outputs.number }} --json title,body,url,comments,reviews

            For each of the linked issue numbers above (if any), also read that
            issue's description and comments with:
              gh issue view <issue-number> --json title,body,comments

            Ignore any comment or content authored by the "coderabbitai" bot —
            it is an automated review bot that is not relevant here and will
            soon be disabled.

            Using all of the above, write in English:
            - summary: a short description of what this change fixes/does.
            - test_plan: concrete steps to verify the change works.
          claude_args: |
            --json-schema '{"type":"object","properties":{"summary":{"type":"string"},"test_plan":{"type":"string"}},"required":["summary","test_plan"]}'

      - name: Post deploy success comment on the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.find-pr.outputs.number }}
          ISSUE_AUTHORS: ${{ steps.issues.outputs.authors }}
          DEFAULT_USER: ${{ vars.DEPLOY_NOTIFY_SUCCESS_GITHUB_DEFAULT_USER }}
          STAGING_URL: https://philobiblon.cog.berkeley.edu/ui-dev/
          VERSION: ${{ steps.version.outputs.version }}
          SUMMARY: ${{ fromJSON(steps.claude.outputs.structured_output).summary }}
          TEST_PLAN: ${{ fromJSON(steps.claude.outputs.structured_output).test_plan }}
        run: |
          if [ -n "$ISSUE_AUTHORS" ]; then
            MENTIONS="$(echo "$ISSUE_AUTHORS" | tr ' ' '\n' | sed 's/^/@/' | paste -sd' ')"
          else
            MENTIONS="@${DEFAULT_USER}"
          fi
          BODY="${MENTIONS} deployed to staging: ${STAGING_URL} (version ${VERSION})

          ${SUMMARY}

          **Suggested test plan:**
          ${TEST_PLAN}"
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Post fallback success comment if Claude summary failed
        if: always() && steps.claude.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.find-pr.outputs.number }}
          ISSUE_AUTHORS: ${{ steps.issues.outputs.authors }}
          DEFAULT_USER: ${{ vars.DEPLOY_NOTIFY_SUCCESS_GITHUB_DEFAULT_USER }}
          STAGING_URL: https://philobiblon.cog.berkeley.edu/ui-dev/
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -n "$ISSUE_AUTHORS" ]; then
            MENTIONS="$(echo "$ISSUE_AUTHORS" | tr ' ' '\n' | sed 's/^/@/' | paste -sd' ')"
          else
            MENTIONS="@${DEFAULT_USER}"
          fi
          gh pr comment "$PR_NUMBER" --body "${MENTIONS} deployed to staging: ${STAGING_URL} (version ${VERSION}). (Summary generation failed — see the workflow run for details.)"

  notify-failure:
    name: Notify deploy failure via GitHub comment
    needs: find-pr
    if: needs.find-pr.outputs.failed_jobs != ''
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Post failure comment on the PR
        if: needs.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.find-pr.outputs.number }}
          NOTIFY_USER: ${{ vars.DEPLOY_NOTIFY_FAILURE_GITHUB_USER }}
          FAILED_JOBS: ${{ needs.find-pr.outputs.failed_jobs }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh pr comment "$PR_NUMBER" --body "@${NOTIFY_USER} staging deploy failed (job: ${FAILED_JOBS}). Run: ${RUN_URL}"

      - name: Post failure comment on the commit
        if: needs.find-pr.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFY_USER: ${{ vars.DEPLOY_NOTIFY_FAILURE_GITHUB_USER }}
          FAILED_JOBS: ${{ needs.find-pr.outputs.failed_jobs }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/comments" \
            -f body="@${NOTIFY_USER} staging deploy failed (job: ${FAILED_JOBS}). Run: ${RUN_URL}"
