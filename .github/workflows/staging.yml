name: Staging — build, push & deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Compute short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update frontend version
        run: |
          BASE_VERSION="$(sed -n "s/^[[:space:]]*version: '\([^']*\)'.*/\1/p" frontend/nuxt.config.ts | head -n1)"
          [ -n "$BASE_VERSION" ] || { echo "ERROR: version key not found in frontend/nuxt.config.ts" >&2; exit 1; }
          NEW_VERSION="${BASE_VERSION}-${{ steps.meta.outputs.short_sha }}"
          sed -i "s/version: '[^']*'/version: '${NEW_VERSION}'/" frontend/nuxt.config.ts
          grep -q "version: '${NEW_VERSION}'" frontend/nuxt.config.ts || { echo "ERROR: frontend version update failed" >&2; exit 1; }

      - name: Build & push backend
        uses: docker/build-push-action@v7.1.0
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-backend:main-${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-backend:main-latest
          labels: org.opencontainers.image.source=https://github.com/PhiloBiblon/philobiblon-ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v7.1.0
        with:
          context: frontend
          push: true
          build-args: |
            BASE_URL=${{ vars.BASE_URL }}
            API_BASE_URL=${{ vars.API_BASE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-frontend:main-${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-frontend:main-latest
          labels: org.opencontainers.image.source=https://github.com/PhiloBiblon/philobiblon-ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            docker compose -f docker-compose.ui-dev.yml pull
            docker compose -f docker-compose.ui-dev.yml up -d
            docker images --filter "dangling=true" --filter "label=org.opencontainers.image.source=https://github.com/PhiloBiblon/philobiblon-ui" -q | xargs -r docker rmi -f

  cleanup:
    name: Clean up old staging images
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        package: [philobiblon-ui-backend, philobiblon-ui-frontend]

    steps:
      - name: Delete old versions of ${{ matrix.package }}
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^v'
          token: ${{ secrets.GITHUB_TOKEN }}
