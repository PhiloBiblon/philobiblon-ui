name: Staging — build, push & deploy

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/staging.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  find-pr:
    name: Find associated pull request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      number: ${{ steps.find.outputs.number }}
      title: ${{ steps.find.outputs.title }}
      url: ${{ steps.find.outputs.url }}

    steps:
      - name: Find pull request for this commit
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON="$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0] // empty')"
          if [ -z "$PR_JSON" ]; then
            echo "No pull request associated with ${{ github.sha }}"
            exit 0
          fi
          echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$PR_JSON" | jq -r '.html_url')" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Compute short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update frontend version
        run: |
          BASE_VERSION="$(sed -n "s/^[[:space:]]*version: '\([^']*\)'.*/\1/p" frontend/nuxt.config.ts | head -n1)"
          [ -n "$BASE_VERSION" ] || { echo "ERROR: version key not found in frontend/nuxt.config.ts" >&2; exit 1; }
          NEW_VERSION="${BASE_VERSION}-${{ steps.meta.outputs.short_sha }}"
          sed -i "s/version: '[^']*'/version: '${NEW_VERSION}'/" frontend/nuxt.config.ts
          grep -q "version: '${NEW_VERSION}'" frontend/nuxt.config.ts || { echo "ERROR: frontend version update failed" >&2; exit 1; }

      - name: Build & push backend
        uses: docker/build-push-action@v7.1.0
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-backend:main-${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-backend:main-latest
          labels: org.opencontainers.image.source=https://github.com/PhiloBiblon/philobiblon-ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v7.1.0
        with:
          context: frontend
          push: true
          build-args: |
            BASE_URL=${{ vars.BASE_URL }}
            API_BASE_URL=${{ vars.API_BASE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-frontend:main-${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-frontend:main-latest
          labels: org.opencontainers.image.source=https://github.com/PhiloBiblon/philobiblon-ui
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            docker compose -f docker-compose.ui-local.yml -f docker-compose.ui-dev.yml pull
            docker compose -f docker-compose.ui-local.yml -f docker-compose.ui-dev.yml up -d
            docker images --filter "dangling=true" --filter "label=org.opencontainers.image.source=https://github.com/PhiloBiblon/philobiblon-ui" -q | xargs -r docker rmi -f

  notify-failure:
    name: Notify deploy failure via GitHub comment
    needs: [build-and-push, deploy, find-pr]
    if: always() && (needs.build-and-push.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Determine failed job(s)
        id: failed
        run: |
          FAILED=""
          for pair in "build-and-push:${{ needs.build-and-push.result }}" "deploy:${{ needs.deploy.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            if [ "$result" != "success" ]; then
              FAILED="${FAILED:+$FAILED, }$name ($result)"
            fi
          done
          echo "jobs=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Post failure comment on the PR
        if: needs.find-pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.find-pr.outputs.number }}
          NOTIFY_USER: ${{ vars.DEPLOY_NOTIFY_FAILURE_GITHUB_USER }}
          FAILED_JOBS: ${{ steps.failed.outputs.jobs }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" --body "@${NOTIFY_USER} staging deploy failed (job: ${FAILED_JOBS}). Run: ${RUN_URL}"

      - name: Post failure comment on the commit
        if: needs.find-pr.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTIFY_USER: ${{ vars.DEPLOY_NOTIFY_FAILURE_GITHUB_USER }}
          FAILED_JOBS: ${{ steps.failed.outputs.jobs }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="@${NOTIFY_USER} staging deploy failed (job: ${FAILED_JOBS}). Run: ${RUN_URL}"

  cleanup:
    name: Clean up old staging images
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        package: [philobiblon-ui-backend, philobiblon-ui-frontend]

    steps:
      - name: Delete old versions of ${{ matrix.package }}
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^v'
          token: ${{ secrets.GITHUB_TOKEN }}
