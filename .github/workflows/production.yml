name: Production — build, push & deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Extract version tag
        id: tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: no version tag available (not a tag push and no version input)" >&2
            exit 1
          fi

      - name: Update frontend version
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_CLEAN="${VERSION#v}"
          VERSION_ESCAPED="$(printf '%s' "$VERSION_CLEAN" | sed 's/[\/&]/\\&/g')"
          sed -i "s/version: '[^']*'/version: '${VERSION_ESCAPED}'/" frontend/nuxt.config.js
          grep -q "version: '${VERSION_CLEAN}'" frontend/nuxt.config.js || { echo "ERROR: frontend version update failed" >&2; exit 1; }

      - name: Build & push backend
        uses: docker/build-push-action@v7.1.0
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-backend:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v7.1.0
        with:
          context: frontend
          push: true
          build-args: |
            BASE_URL=${{ vars.BASE_URL }}
            API_BASE_URL=${{ vars.API_BASE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-frontend:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/philobiblon-ui-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            docker compose -f docker-compose.ui-fact.yml pull
            docker compose -f docker-compose.ui-fact.yml up -d
            docker image prune -f
